[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# API routes go to Netlify Functions
[[redirects]]
  from = "/api/live"
  to = "/.netlify/functions/api-live"
  status = 200

# SPA catch-all (must be LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
